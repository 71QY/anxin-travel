server:
  port: 8080
  address: 0.0.0.0  # 允许外部访问（真机联调必需）
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: travel
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/anxin_travel?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:0705106042}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
      enabled: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

anxin:
  jwt:
    secret: ${JWT_SECRET:A1b2C3d4E5f6G7h8I9j0K}
    expire: 7200000
  amap:
    web-api-key: ${AMAP_WEB_API_KEY:4deaf4093cad0b049151ee780f5f85cd}
    search-radius: 50000
  tencent:
    map:
      key: MDABZ-DRU6V-RPNPV-5C2QQ-N32JH-BTFRL
  sms:
    # 短信服务商配置 (后续接入真实服务时填写)
    provider: mock  # mock=模拟模式，aliyun=阿里云，tencent=腾讯云
    aliyun:
      access-key-id: 
      access-key-secret: 
      sign-name: 
      template-code: 
    tencent:
      secret-id: 
      secret-key: 
      app-id: 
      sign-name: 
      template-id: 

tongyi:
  api:
    key: ${TONGYI_API_KEY:sk-40f32f4efaa94ab3ba00a9e51abf6f04}
    url: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 明确指定 JDBC 类型处理器使用 UTF-8
    jdbc-type-for-null: OTHER
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  charset:
    console: UTF-8
    file: UTF-8
